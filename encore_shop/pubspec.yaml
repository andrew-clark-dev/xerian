name: encore_shop
description: "A new Flutter project."

# Prevent accidental publishing to pub.dev.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.4 <4.0.0"

dependencies:
  amazon_cognito_identity_dart_2: ^3.6.4
  aws_dynamodb_api: ^2.0.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  flutter_localizations:
    sdk: flutter
  flutter_login: ^5.0.0
  get_it: ^7.7.0
  go_router: ^14.0.1
  json_annotation: ^4.9.0
  uuid: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  build_runner: ^2.3.3
  json_serializable: ^6.6.0

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/images/
    # Env file used by flutter_dotenv.
    - assets/.env
